<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="/assets/images/CB.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notícias — CartaBrasil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { max-width: 100%; height: auto; }

    :root {
      --ink: #111111;
      --ink-light: #555555;
      --ink-muted: #999999;
      --rule: #e0e0e0;
      --bg: #fafaf8;
      --paper: #ffffff;
      --accent: #c0392b;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--rule);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .logo strong { font-weight: 700; }

    .logo-mascot {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }


    .header-meta {
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── DATELINE ──────────────────────────────────────────── */
    .dateline {
      text-align: center;
      padding: 0.6rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
    }

    /* ── MAIN ──────────────────────────────────────────────── */
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
      flex: 1;
    }

    .page-title {
      font-family: 'Lora', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    /* ── FILTERS ───────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .filter-chip {
      padding: 0.4rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: transparent;
      border: 1px solid var(--rule);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-chip:hover {
      border-color: var(--ink-muted);
      color: var(--ink-light);
    }

    .filter-chip.active {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }

    /* ── NEWS LIST ─────────────────────────────────────────── */
    .news-list {
      list-style: none;
    }

    .news-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--rule);
      display: block;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }

    .news-item:hover { opacity: 0.65; }
    .news-item:last-child { border-bottom: none; }

    .news-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .news-category {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: inline-block;
    }

    .cat-politica { color: #c0392b; }
    .cat-economia, .cat-mercados { color: #2c3e50; }
    .cat-internacional { color: #d4a017; }
    .cat-tecnologia { color: #2980b9; }
    .cat-geral { color: #7f8c8d; }
    .cat-direitos-humanos { color: #8e44ad; }
    .cat-educacao { color: #27ae60; }
    .cat-esportes { color: #e67e22; }
    .cat-justica { color: #2c3e50; }
    .cat-saude { color: #16a085; }
    .cat-analise { color: #c0392b; }

    .news-time {
      font-size: 0.65rem;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    .news-headline {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--ink);
      margin-bottom: 0.35rem;
    }

    .news-description {
      font-size: 0.85rem;
      color: var(--ink-light);
      line-height: 1.55;
      font-weight: 300;
    }

    /* ── LOAD MORE ─────────────────────────────────────────── */
    .load-more-wrap {
      text-align: center;
      padding-top: 2rem;
    }

    .btn-load-more {
      display: inline-block;
      padding: 0.75rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-load-more:hover {
      background: var(--ink);
      color: white;
    }

    .btn-load-more:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ── EMPTY STATE ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 0;
      color: var(--ink-muted);
      font-size: 0.9rem;
    }

    /* ── FOOTER ────────────────────────────────────────────── */
    .site-footer {
      background: var(--ink);
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
      line-height: 1.6;
    }

    .footer-top {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 2rem;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 2.5rem;
    }

    .footer-brand .footer-logo {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #fff;
      text-decoration: none;
    }


    .footer-brand p {
      margin-top: 0.8rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      line-height: 1.7;
      max-width: 280px;
    }

    .footer-col h4 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1rem;
    }

    .footer-col a {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      padding: 0.25rem 0;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-col a:hover { color: #fff; }

    .footer-bottom {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.2rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-bottom p {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.06em;
    }

    .footer-bottom a {
      color: rgba(255,255,255,0.35);
      transition: color 0.15s;
    }

    .footer-bottom a:hover { color: rgba(255,255,255,0.7); }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .main { padding: 2rem 1.5rem 3rem; }
      .page-title { font-size: 1.3rem; }
      .footer-top { grid-template-columns: 1fr 1fr; }
      .footer-brand { grid-column: 1 / -1; }
    }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 0.4rem; text-align: center; }
      .main { padding: 1.5rem 1rem 2.5rem; }
      .page-title { font-size: 1.15rem; margin-bottom: 1rem; }
      .filters { gap: 0.4rem; margin-bottom: 1.5rem; padding-bottom: 1rem; }
      .filter-chip { padding: 0.35rem 0.7rem; font-size: 0.65rem; }
      .news-item { padding: 1.2rem 0; }
      .news-item-header { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .news-headline { font-size: 1rem; }
      .news-description { font-size: 0.82rem; }
      .footer-top { grid-template-columns: 1fr; gap: 1.5rem; }
      .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="/">Carta<strong>Brasil</strong></a>
    <p class="header-meta">Carta<strong>Brasil</strong> · Breaking news</p>
  </header>

  <!-- DATELINE -->
  <div class="dateline" id="dateline"></div>

  <!-- MAIN -->
  <div class="main">
    <h1 class="page-title">Últimas notícias</h1>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-chip active" data-cat="todas">Todas</button>
      <button class="filter-chip" data-cat="politica">Política</button>
      <button class="filter-chip" data-cat="mercados">Economia</button>
      <button class="filter-chip" data-cat="internacional">Mundo</button>
      <button class="filter-chip" data-cat="tecnologia">Tecnologia</button>
      <button class="filter-chip" data-cat="geral">Geral</button>
    </div>

    <!-- NEWS LIST -->
    <div class="news-list" id="newsList"></div>

    <!-- LOAD MORE -->
    <div class="load-more-wrap">
      <button class="btn-load-more" id="btnLoadMore">Carregar mais</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-top">
      <div class="footer-brand">
        <a class="footer-logo" href="/">Carta<strong>Brasil</strong></a>
      </div>
      <div class="footer-col">
        <h4>Editorias</h4>
        <a href="/?section=politica">Política</a>
        <a href="/?section=economia">Economia</a>
        <a href="/?section=internacional">Mundo</a>
        <a href="/?section=tecnologia">Tecnologia</a>
      </div>
      <div class="footer-col">
        <h4>Brasil</h4>
        <a href="/?section=direitos-humanos">Direitos Humanos</a>
        <a href="/?section=educacao">Educação</a>
        <a href="/?section=esportes">Esportes</a>
        <a href="/?section=justica">Justiça</a>
        <a href="/?section=saude">Saúde</a>
        <a href="/?section=geral">Geral</a>
      </div>
      <div class="footer-col">
        <h4>Institucional</h4>
        <a href="/newsletter">Assinar</a>
        <a href="acervo.html">Acervo</a>
        <a href="#">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="privacidade.html">Privacidade</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Carta<strong>Brasil</strong>. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://zlcntgizmaapqkteaxkd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsY250Z2l6bWFhcHFrdGVheGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDY3ODcsImV4cCI6MjA4Nzg4Mjc4N30.p-DHtTw-AeGYDswsBR73V8jQXlpW_g_6out1xtT6Cr4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const categoryLabels = {
      politica: 'Política',
      economia: 'Economia',
      mercados: 'Economia',
      internacional: 'Mundo',
      tecnologia: 'Tecnologia',
      geral: 'Geral',
      'direitos-humanos': 'Direitos Humanos',
      educacao: 'Educação',
      esportes: 'Esportes',
      justica: 'Justiça',
      saude: 'Saúde',
      analise: 'Análise'
    };

    const PAGE_SIZE = 20;
    let currentCategory = 'todas';
    let offset = 0;
    let loading = false;

    // Dateline
    const d = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const formatted = d.toLocaleDateString('pt-BR', opts);
    document.getElementById('dateline').textContent =
      formatted.charAt(0).toUpperCase() + formatted.slice(1);

    // Filters
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentCategory = chip.dataset.cat;
        offset = 0;
        document.getElementById('newsList').innerHTML = '';
        loadArticles();
      });
    });

    function formatDate(dateStr) {
      const dt = new Date(dateStr);
      const now = new Date();
      const isToday = dt.toDateString() === now.toDateString();

      const h = dt.getHours().toString().padStart(2, '0');
      const m = dt.getMinutes().toString().padStart(2, '0');
      const time = h + 'h' + m;

      if (isToday) return time;

      const day = dt.getDate();
      const month = dt.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '');
      return day + ' ' + month + ' · ' + time;
    }

    function renderArticle(a) {
      const label = categoryLabels[a.category] || a.category;
      const catClass = 'cat-' + a.category;

      return '<a class="news-item" href="noticia.html?id=' + a.id + '">' +
        '<div class="news-item-header">' +
          '<span class="news-category ' + catClass + '">' + label + '</span>' +
          '<span class="news-time">' + formatDate(a.published_at) + '</span>' +
        '</div>' +
        '<p class="news-headline">' + a.title + '</p>' +
        (a.description ? '<p class="news-description">' + a.description + '</p>' : '') +
      '</a>';
    }

    async function loadArticles() {
      if (loading) return;
      loading = true;

      const btn = document.getElementById('btnLoadMore');
      btn.textContent = 'Carregando...';
      btn.disabled = true;

      let query = sb
        .from('articles')
        .select('id, title, description, category, published_at')
        .eq('status', 'published')
        .order('published_at', { ascending: false })
        .range(offset, offset + PAGE_SIZE - 1);

      if (currentCategory !== 'todas') {
        query = query.eq('category', currentCategory);
      }

      const { data: articles, error } = await query;

      const list = document.getElementById('newsList');

      if (error) {
        console.error(error);
        btn.textContent = 'Erro ao carregar';
        loading = false;
        return;
      }

      if (articles.length === 0 && offset === 0) {
        list.innerHTML = '<div class="empty-state">Nenhuma notícia encontrada.</div>';
        btn.style.display = 'none';
        loading = false;
        return;
      }

      list.insertAdjacentHTML('beforeend', articles.map(renderArticle).join(''));
      offset += articles.length;

      if (articles.length < PAGE_SIZE) {
        btn.style.display = 'none';
      } else {
        btn.textContent = 'Carregar mais';
        btn.disabled = false;
        btn.style.display = '';
      }

      loading = false;
    }

    document.getElementById('btnLoadMore').addEventListener('click', loadArticles);

    // Load inicial
    loadArticles();
  </script>

</body>
</html>
