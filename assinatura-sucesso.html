<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="/assets/images/CB.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assinatura Confirmada — CartaBrasil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111111;
      --ink-light: #555555;
      --ink-muted: #999999;
      --rule: #e0e0e0;
      --bg: #fafaf8;
      --paper: #ffffff;
      --accent: #c0392b;
      --green: #27ae60;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--rule);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .logo strong { font-weight: 700; }

    .header-meta {
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .content {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 5rem 2rem;
      text-align: center;
    }

    .content h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 0.8rem;
    }

    .content p {
      font-size: 0.9rem;
      color: var(--ink-light);
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    .content .user-email {
      font-weight: 500;
      color: var(--ink);
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 1.2rem;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--green);
      color: white;
      margin-bottom: 2rem;
    }

    .benefits {
      text-align: left;
      max-width: 360px;
      margin: 0 auto 2rem;
    }

    .benefits li {
      list-style: none;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--rule);
      font-size: 0.85rem;
      color: var(--ink-light);
    }

    .benefits li::before {
      content: '✓';
      color: var(--green);
      font-weight: 700;
      margin-right: 0.75rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      background: var(--ink);
      color: white;
    }

    .btn:hover { background: #333; }

    footer {
      border-top: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--paper);
    }

    footer p {
      font-size: 0.65rem;
      color: var(--ink-muted);
      letter-spacing: 0.06em;
    }

    footer a {
      color: var(--ink-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--ink); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content { animation: fadeUp 0.6s ease both; }

    .loading { color: var(--ink-muted); }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 0.4rem; text-align: center; }
      .content { padding: 3rem 1rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">Carta<strong>Brasil</strong></a>
    <p class="header-meta">Carta<strong>Brasil</strong> · Premium</p>
  </header>

  <div class="content" id="mainContent">
    <p class="loading" id="loadingMsg">Verificando pagamento...</p>
  </div>

  <footer>
    <p>&copy; 2026 Carta<strong>Brasil</strong> &middot; Todos os direitos reservados</p>
    <p><a href="/privacidade">Privacidade</a> &middot; <a href="/">Portal</a></p>
  </footer>

  <script>
    var SUPABASE_URL = 'https://zlcntgizmaapqkteaxkd.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsY250Z2l6bWFhcHFrdGVheGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDY3ODcsImV4cCI6MjA4Nzg4Mjc4N30.p-DHtTw-AeGYDswsBR73V8jQXlpW_g_6out1xtT6Cr4';

    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');
    var contentEl = document.getElementById('mainContent');

    if (!sessionId) {
      contentEl.innerHTML =
        '<h1>Link inválido</h1>' +
        '<p>Use o link de confirmação que recebeu após o pagamento.</p>' +
        '<a class="btn" href="/">Voltar ao portal</a>';
    } else {
      // Verifica a sessão do Stripe
      fetch(SUPABASE_URL + '/functions/v1/verify-session', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ session_id: sessionId })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.ok && data.email) {
          // Salva status premium no localStorage
          localStorage.setItem('cb_plan', 'premium');
          localStorage.setItem('cb_email', data.email);

          contentEl.innerHTML =
            '<span class="badge">Premium ativo</span>' +
            '<h1>Bem-vindo ao CartaBrasil Premium!</h1>' +
            '<p>Sua assinatura está confirmada para <span class="user-email">' + data.email + '</span>.</p>' +
            '<ul class="benefits">' +
              '<li>Navegação sem anúncios</li>' +
              '<li>Newsletter com acesso prioritário</li>' +
              '<li>Apoio ao jornalismo independente</li>' +
            '</ul>' +
            '<a class="btn" href="/">Acessar o portal</a>';
        } else {
          contentEl.innerHTML =
            '<h1>Erro na verificação</h1>' +
            '<p>' + (data.error || 'Não foi possível confirmar o pagamento.') + '</p>' +
            '<a class="btn" href="/">Voltar ao portal</a>';
        }
      })
      .catch(function() {
        contentEl.innerHTML =
          '<h1>Erro de conexão</h1>' +
          '<p>Tente novamente em instantes.</p>' +
          '<a class="btn" href="/">Voltar ao portal</a>';
      });
    }
  </script>

</body>
</html>
