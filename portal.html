<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta Brasil</title>
  <link rel="icon" type="image/png" href="assets/images/cart.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111111;
      --ink-light: #555555;
      --ink-muted: #999999;
      --rule: #e0e0e0;
      --bg: #fafaf8;
      --paper: #ffffff;
      --accent: #c0392b;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--rule);
      padding: 0.8rem 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--paper);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .header-center {
      text-align: center;
    }

    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.8rem;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }

    .logo span { color: var(--accent); margin-left: -0.15em; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    .icon-btn:hover { opacity: 0.6; }

    .icon-btn svg { width: 20px; height: 20px; }

    .btn-subscribe {
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.45rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-subscribe:hover { opacity: 0.8; }

    /* ── SEARCH OVERLAY ───────────────────────────────────────── */
    .search-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
    }

    .search-overlay.active { display: flex; }

    .search-box {
      background: var(--paper);
      width: 100%;
      max-width: 640px;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      animation: fadeDown 0.25s ease;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--rule);
      gap: 0.8rem;
    }

    .search-input-wrap svg { width: 20px; height: 20px; color: var(--ink-muted); flex-shrink: 0; }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      background: transparent;
    }

    .search-input::placeholder { color: var(--ink-muted); }

    .search-close {
      background: none;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.65rem;
      color: var(--ink-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .search-results {
      max-height: 420px;
      overflow-y: auto;
    }

    .search-result-item {
      display: block;
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--rule);
      transition: background 0.12s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg); }

    .search-result-cat {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .search-result-title {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
    }

    .search-result-time {
      font-size: 0.62rem;
      color: var(--ink-muted);
      margin-top: 0.2rem;
    }

    .search-empty {
      padding: 2rem 1.2rem;
      text-align: center;
      color: var(--ink-muted);
      font-size: 0.85rem;
    }

    /* ── NAV ────────────────────────────────────────────────── */
    .nav-bar {
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── STICKY BAR (appears on scroll) ───────────────────── */
    .sticky-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 2rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }

    .sticky-bar.visible { transform: translateY(0); }

    .sticky-left {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .sticky-nav {
      display: flex;
      justify-content: center;
      gap: 0;
    }

    .sticky-nav .nav-link {
      padding: 0.65rem 1.2rem;
      font-size: 0.72rem;
    }

    .sticky-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .nav-links {
      display: flex;
      gap: 0;
      flex: 1;
      justify-content: center;
    }

    .nav-date {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      white-space: nowrap;
      margin-left: auto;
    }

    .nav-link {
      padding: 0.7rem 1.4rem;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--ink-light);
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }

    .nav-link:hover { color: var(--ink); }

    .nav-link.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    /* ── CONTAINER ─────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
    }

    /* ── CATEGORY LABELS ───────────────────────────────────── */
    .cat {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: inline-block;
    }

    .cat-politica { color: #c0392b; }
    .cat-mercados { color: #2c3e50; }
    .cat-internacional { color: #d4a017; }
    .cat-tecnologia { color: #2980b9; }
    .cat-geral { color: #7f8c8d; }

    .time {
      font-size: 0.65rem;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    /* ── HERO (FT-style 3-column) ─────────────────────────── */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr 0.7fr;
      gap: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero-main { padding-right: 1.5rem; border-right: 1px solid var(--rule); }

    .hero-main .cat { margin-bottom: 0.6rem; }

    .hero-title {
      font-family: 'Lora', serif;
      font-size: clamp(1.5rem, 2.8vw, 2rem);
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.7rem;
    }

    .hero-title a { transition: opacity 0.15s; }
    .hero-title a:hover { opacity: 0.7; }

    .hero-desc {
      font-size: 0.88rem;
      color: var(--ink-light);
      line-height: 1.6;
      font-weight: 300;
    }

    .hero-media { position: relative; }

    .hero-media a { display: block; transition: opacity 0.15s; }
    .hero-media a:hover { opacity: 0.85; }

    .hero-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      border-radius: 4px;
    }

    .hero-media-caption {
      margin-top: 0.8rem;
    }

    .hero-media-title {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      margin-top: 0.3rem;
    }

    .hero-sidebar {
      padding-left: 1.5rem;
      border-left: 1px solid var(--rule);
    }

    .sidebar-item {
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
      transition: opacity 0.15s;
    }

    .sidebar-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .sidebar-item:hover { opacity: 0.7; }

    .sidebar-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    .sidebar-title {
      font-family: 'Lora', serif;
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
    }

    /* ── HEADLINES LIST (below hero, left column) ─────────── */
    .below-hero {
      display: grid;
      grid-template-columns: 1fr 1.4fr 0.7fr;
      gap: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 2rem;
    }

    .headlines-col {
      padding-right: 1.5rem;
      border-right: 1px solid var(--rule);
    }

    .headline-item {
      display: block;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--rule);
      transition: opacity 0.15s;
      animation: fadeUp 0.5s ease both;
    }

    .headline-item:last-child { border-bottom: none; }
    .headline-item:hover { opacity: 0.65; }

    .headline-title {
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      margin-top: 0.15rem;
    }

    .badge-new {
      display: inline-block;
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    /* center column - featured article below hero */
    .featured-center {
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .featured-center a { display: block; transition: opacity 0.15s; }
    .featured-center a:hover { opacity: 0.8; }

    .featured-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      margin-bottom: 0.7rem;
    }

    .featured-title {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
      margin-top: 0.3rem;
    }

    .featured-desc {
      font-size: 0.82rem;
      color: var(--ink-light);
      line-height: 1.55;
      font-weight: 300;
      margin-top: 0.3rem;
    }

    /* right column - more sidebar */
    .sidebar-extra {
      padding-left: 1.5rem;
      border-left: 1px solid var(--rule);
    }

    /* ── SECTION RULE ──────────────────────────────────────── */
    .section-rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-rule::before,
    .section-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .section-rule span {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    /* ── CATEGORY SECTIONS ─────────────────────────────────── */
    .cat-section { margin-bottom: 2.5rem; }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .cat-card {
      display: block;
      transition: opacity 0.15s;
      animation: fadeUp 0.5s ease both;
    }

    .cat-card:nth-child(2) { animation-delay: 0.06s; }
    .cat-card:nth-child(3) { animation-delay: 0.12s; }
    .cat-card:hover { opacity: 0.7; }

    .cat-card-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      margin-bottom: 0.7rem;
      border-radius: 4px;
    }

    .cat-card-title {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 0.25rem;
    }

    .cat-card-desc {
      font-size: 0.78rem;
      color: var(--ink-light);
      line-height: 1.5;
      font-weight: 300;
    }

    .cat-card-meta { margin-bottom: 0.35rem; }

    /* ── PLACEHOLDER IMG ───────────────────────────────────── */
    .img-placeholder {
      background: var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
    }

    /* ── FOOTER ────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--paper);
    }

    footer p {
      font-size: 0.65rem;
      color: var(--ink-muted);
      letter-spacing: 0.06em;
    }

    /* ── LOADING ───────────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--ink-muted);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
    }

    /* ── ANIMATION ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .hero-grid { grid-template-columns: 1fr 1.2fr; }
      .hero-sidebar { display: none; }
      .below-hero { grid-template-columns: 1fr 1.2fr; }
      .sidebar-extra { display: none; }
    }

    @media (max-width: 768px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-main { padding-right: 0; border-right: none; }
      .hero-media { order: -1; }
      .below-hero { grid-template-columns: 1fr; }
      .headlines-col { padding-right: 0; border-right: none; }
      .featured-center { margin-top: 1rem; }
      .cat-grid { grid-template-columns: 1fr 1fr; }
      .nav-bar { overflow-x: auto; }
      .nav-link { white-space: nowrap; padding: 0.7rem 1rem; }
      .logo { font-size: 1.6rem; }
      .sticky-bar { padding: 0 1rem; }
      .sticky-nav { overflow-x: auto; }
      .sticky-nav .nav-link { white-space: nowrap; padding: 0.6rem 0.8rem; font-size: 0.68rem; }
    }

    @media (max-width: 600px) {
      header { padding: 0.8rem 1rem; }
      .container { padding: 1.2rem 1rem; }
      .cat-grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 1.4rem; }
      .nav-date { display: none; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
      .sticky-right .btn-subscribe { display: none; }
      .search-overlay { padding-top: 20px; }
      .search-box { margin: 0 0.5rem; }
    }
  </style>
</head>

  <!-- HEADER (FT-style) -->
  <header>
    <div class="header-left">

    // ── HELPERS ───────────────────────────────────────────────

    function formatTime(dateStr) {
      const dt = new Date(dateStr);
      const now = new Date();
      const isToday = dt.toDateString() === now.toDateString();
      const h = dt.getHours().toString().padStart(2, '0');
      const m = dt.getMinutes().toString().padStart(2, '0');
      const time = h + 'h' + m;
      if (isToday) return time;
      const day = dt.getDate();
      const month = dt.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '');
      return day + ' ' + month + ' · ' + time;
    }

    function imgTag(url, cls) {
      if (url) return '<img class="' + cls + '" src="' + url + '" alt="" loading="lazy" />';
      return '<div class="' + cls + ' img-placeholder">Sem imagem</div>';
    }

    function truncate(text, max) {
      if (!text) return '';
      if (text.length <= max) return text;
      return text.slice(0, max).replace(/\s+\S*$/, '') + '…';
    }

    function link(id) { return 'noticia.html?id=' + id; }

    function isRecent(dateStr) {
      const dt = new Date(dateStr);
      const now = new Date();
      return (now - dt) < 3600000; // less than 1 hour
    }

    // ── DATELINE ─────────────────────────────────────────────

    const d = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const fmt = d.toLocaleDateString('pt-BR', opts);
    document.getElementById('dateline').textContent = fmt.charAt(0).toUpperCase() + fmt.slice(1);

    // ── STICKY BAR (clone nav links) ──────────────────────────

    const stickyBar = document.getElementById('stickyBar');
    const stickyNav = document.getElementById('stickyNav');
    const navBar = document.querySelector('.nav-bar');

    // Clone nav links into sticky bar
    document.querySelectorAll('.nav-bar .nav-link').forEach(link => {
      const clone = link.cloneNode(true);
      clone.classList.add('sticky-link');
      stickyNav.appendChild(clone);
    });

    // ── NAV (handle clicks on both nav-bar and sticky-bar) ──

    function setActiveSection(section) {
      currentSection = section;
      document.querySelectorAll('.nav-link').forEach(b => {
        b.classList.toggle('active', b.dataset.section === section);
      });
      render();
    }

    document.querySelectorAll('.nav-link').forEach(btn => {
      btn.addEventListener('click', () => setActiveSection(btn.dataset.section));
    });

    // ── SCROLL → show/hide sticky bar ───────────────────────

    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const threshold = navBar.offsetTop + navBar.offsetHeight;
          stickyBar.classList.toggle('visible', window.scrollY > threshold);
          ticking = false;
        });
        ticking = true;
      }
    });

    // ── SEARCH ───────────────────────────────────────────────

    const searchOverlay = document.getElementById('searchOverlay');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    function openSearch() {
      searchOverlay.classList.add('active');
      searchInput.value = '';
      searchResults.innerHTML = '';
      setTimeout(() => searchInput.focus(), 100);
    }

    document.getElementById('searchBtn').addEventListener('click', openSearch);
    document.getElementById('searchBtn2').addEventListener('click', openSearch);

    function closeSearch() {
      searchOverlay.classList.remove('active');
      searchInput.value = '';
      searchResults.innerHTML = '';
    }

    document.getElementById('searchClose').addEventListener('click', closeSearch);

    searchOverlay.addEventListener('click', (e) => {
      if (e.target === searchOverlay) closeSearch();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && searchOverlay.classList.contains('active')) closeSearch();
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchOverlay.classList.add('active');
        searchInput.value = '';
        searchResults.innerHTML = '';
        setTimeout(() => searchInput.focus(), 100);
      }
    });

    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const query = searchInput.value.trim().toLowerCase();
      if (query.length < 2) {
        searchResults.innerHTML = '';
        return;
      }
      searchTimeout = setTimeout(() => performSearch(query), 200);
    });

    function performSearch(query) {
      const results = allArticles.filter(a =>
        a.title.toLowerCase().includes(query) ||
        (a.description && a.description.toLowerCase().includes(query))
      ).slice(0, 8);

      if (results.length === 0) {
        searchResults.innerHTML = '<div class="search-empty">Nenhum resultado para "' + query + '"</div>';
        return;
      }

      let html = '';
      results.forEach(a => {
        html += '<a class="search-result-item" href="' + link(a.id) + '">' +
          '<div class="search-result-cat cat-' + a.category + '">' + (categoryLabels[a.category] || a.category) + '</div>' +
          '<div class="search-result-title">' + a.title + '</div>' +
          '<div class="search-result-time">' + formatTime(a.published_at) + '</div>' +
        '</a>';
      });
      searchResults.innerHTML = html;
    }

    // ── RENDER (FT-style layout) ─────────────────────────────

    function renderPage(articles) {
      if (articles.length === 0) return '<div class="loading">Nenhuma notícia disponível.</div>';

      const hero = articles[0];
      const mediaArticle = articles[1];
      const sidebarArticles = articles.slice(2, 5);
      const headlineArticles = articles.slice(5, 10);
      const featuredArticle = articles[10];
      const sidebarExtra = articles.slice(11, 14);

      const usedIds = new Set([
        hero.id,
        mediaArticle && mediaArticle.id,
        ...sidebarArticles.map(a => a.id),
        ...headlineArticles.map(a => a.id),
        featuredArticle && featuredArticle.id,
        ...sidebarExtra.map(a => a.id)
      ].filter(Boolean));

      const remaining = articles.filter(a => !usedIds.has(a.id));

      const byCategory = {};
      remaining.forEach(a => {
        if (!byCategory[a.category]) byCategory[a.category] = [];
        if (byCategory[a.category].length < 3) byCategory[a.category].push(a);
      });

      let html = '';

      // ── Hero grid (3 columns like FT) ──
      html += '<div class="hero-grid">';

      // Left column: category + headline + description
      html += '<div class="hero-main">' +
        '<span class="cat cat-' + hero.category + '">' + (categoryLabels[hero.category] || hero.category) + '</span>' +
        '<h1 class="hero-title"><a href="' + link(hero.id) + '">' + hero.title + '</a></h1>' +
        (hero.description ? '<p class="hero-desc">' + hero.description + '</p>' : '') +
      '</div>';

      // Center column: image + caption article
      if (mediaArticle) {
        html += '<div class="hero-media"><a href="' + link(mediaArticle.id) + '">' +
          imgTag(mediaArticle.image_url, 'hero-img') +
          '<div class="hero-media-caption">' +
            '<span class="cat cat-' + mediaArticle.category + '">' + (categoryLabels[mediaArticle.category] || mediaArticle.category) + '</span>' +
            '<p class="hero-media-title">' + mediaArticle.title + '</p>' +
          '</div>' +
        '</a></div>';
      }

      // Right column: sidebar stories
      if (sidebarArticles.length > 0) {
        html += '<div class="hero-sidebar">';
        sidebarArticles.forEach(a => {
          html += '<a class="sidebar-item" href="' + link(a.id) + '">' +
            (a.image_url ? '<img class="sidebar-img" src="' + a.image_url + '" alt="" loading="lazy" />' : '') +
            '<p class="sidebar-title">' + a.title + '</p>' +
          '</a>';
        });
        html += '</div>';
      }

      html += '</div>';

      // ── Below hero (3 columns) ──
      if (headlineArticles.length > 0 || featuredArticle) {
        html += '<div class="below-hero">';

        // Left: headline list
        html += '<div class="headlines-col">';
        headlineArticles.forEach((a, i) => {
          html += '<a class="headline-item" href="' + link(a.id) + '" style="animation-delay:' + (i * 0.04) + 's">' +
            '<span class="cat cat-' + a.category + '">' + (categoryLabels[a.category] || a.category) + '</span>' +
            '<p class="headline-title">' + a.title + '</p>' +
            (isRecent(a.published_at) ? '<span class="badge-new">novo</span>' : '<span class="time">' + formatTime(a.published_at) + '</span>') +
          '</a>';
        });
        html += '</div>';

        // Center: featured article with image
        if (featuredArticle) {
          html += '<div class="featured-center"><a href="' + link(featuredArticle.id) + '">' +
            imgTag(featuredArticle.image_url, 'featured-img') +
            '<span class="cat cat-' + featuredArticle.category + '">' + (categoryLabels[featuredArticle.category] || featuredArticle.category) + '</span>' +
            '<p class="featured-title">' + featuredArticle.title + '</p>' +
            (featuredArticle.description ? '<p class="featured-desc">' + truncate(featuredArticle.description, 150) + '</p>' : '') +
          '</a></div>';
        }

        // Right: more sidebar items
        if (sidebarExtra.length > 0) {
          html += '<div class="sidebar-extra">';
          sidebarExtra.forEach(a => {
            html += '<a class="sidebar-item" href="' + link(a.id) + '">' +
              '<p class="sidebar-title">' + a.title + '</p>' +
              '<span class="time">' + formatTime(a.published_at) + '</span>' +
            '</a>';
          });
          html += '</div>';
        }

        html += '</div>';
      }

      // ── Category sections ──
      var catOrder = ['politica', 'mercados', 'internacional', 'tecnologia', 'geral'];
      catOrder.forEach(function(catKey) {
        if (byCategory[catKey] && byCategory[catKey].length > 0) {
          var label = categoryLabels[catKey] || catKey;
          html += '<div class="cat-section">' +
            '<div class="section-rule"><span>' + label + '</span></div>' +
            '<div class="cat-grid">';
          byCategory[catKey].forEach(function(a) {
            html += '<a class="cat-card" href="' + link(a.id) + '">' +
              imgTag(a.image_url, 'cat-card-img') +
              '<div class="cat-card-meta"><span class="time">' + formatTime(a.published_at) + '</span></div>' +
              '<p class="cat-card-title">' + a.title + '</p>' +
              (a.description ? '<p class="cat-card-desc">' + truncate(a.description, 100) + '</p>' : '') +
            '</a>';
          });
          html += '</div></div>';
        }
      });

      return html;
    }

    function render() {
      const container = document.getElementById('content');
      let filtered = allArticles;
      if (currentSection !== 'home') {
        filtered = allArticles.filter(a => a.category === currentSection);
      }
      container.innerHTML = renderPage(filtered);
    }

    // ── LOAD ─────────────────────────────────────────────────

    async function loadPortal() {
      const { data: articles, error } = await sb
        .from('articles')
        .select('id, title, description, category, image_url, published_at')
        .eq('status', 'published')
        .order('published_at', { ascending: false })
        .limit(50);

      if (error || !articles || articles.length === 0) {
        document.getElementById('content').innerHTML = '<div class="loading">Nenhuma notícia disponível no momento.</div>';
        return;
      }

      allArticles = articles;
      render();
    }

    loadPortal();
  </script>

</body>
</html>
