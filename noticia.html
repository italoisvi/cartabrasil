<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta de Notícia</title>
  <link rel="icon" type="image/png" href="assets/images/cart.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111111;
      --ink-light: #555555;
      --ink-muted: #999999;
      --rule: #e0e0e0;
      --bg: #fafaf8;
      --paper: #ffffff;
      --accent: #c0392b;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--rule);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span { color: var(--accent); margin-left: -0.4em; }

    .header-meta {
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    article {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .article-meta {
      padding-top: 3rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .article-category {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .article-meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ink-muted);
    }

    .article-date {
      font-size: 0.72rem;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .article-headline {
      font-family: 'Lora', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .article-description {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink-light);
      line-height: 1.6;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .article-source {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--ink-muted);
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .article-source a {
      color: var(--ink);
      font-weight: 500;
      text-decoration: none;
    }

    .article-source a:hover { color: var(--accent); }

    .article-image { margin-bottom: 2.5rem; }

    .article-image img {
      width: 92%;
      max-height: 420px;
      object-fit: cover;
      display: block;
      margin: 0 auto;
      border-radius: 10px;
    }

    .article-image figcaption {
      width: 92%;
      margin: 0.6rem auto 0;
      font-size: 0.7rem;
      color: var(--ink-muted);
      line-height: 1.5;
      letter-spacing: 0.02em;
      text-align: right;
    }

    .article-body { padding-bottom: 3rem; }

    .article-body p {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--ink);
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .article-body p:last-child { margin-bottom: 0; }

    .article-body h2 {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    .article-body h2:first-child { margin-top: 0; }

    .article-body blockquote {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-style: italic;
      line-height: 1.8;
      color: var(--ink-light);
      border-left: 3px solid var(--accent);
      padding: 0.8rem 0 0.8rem 1.5rem;
      margin: 1.5rem 0;
      background: var(--bg);
    }

    .article-body .article-credit {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--ink-muted);
      margin-top: 2rem;
    }

    .article-body img {
      width: 92%;
      max-height: 480px;
      object-fit: cover;
      display: block;
      margin: 2rem auto;
      border-radius: 10px;
    }

    .article-body figure {
      margin: 2rem 0;
    }

    .article-body figure img {
      margin: 0 auto;
    }

    .article-body figure figcaption {
      width: 92%;
      margin: 0.6rem auto 0;
      font-size: 0.7rem;
      color: var(--ink-muted);
      line-height: 1.5;
      letter-spacing: 0.02em;
      text-align: right;
    }

    .article-body a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(192, 57, 43, 0.3);
      text-underline-offset: 2px;
      transition: text-decoration-color 0.15s;
    }

    .article-body a:hover {
      text-decoration-color: var(--accent);
    }

    .article-body ul, .article-body ol {
      margin: 1rem 0 1.5rem 1.5rem;
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      line-height: 1.85;
    }

    .article-body li {
      margin-bottom: 0.5rem;
    }

    .article-end {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 3rem;
    }

    .article-end::before,
    .article-end::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .article-end span {
      font-family: 'Lora', serif;
      font-size: 0.85rem;
      color: var(--ink-muted);
    }

    footer {
      border-top: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--paper);
    }

    footer p {
      font-size: 0.65rem;
      color: var(--ink-muted);
      letter-spacing: 0.06em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg) 25%, #eee 50%, var(--bg) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite ease-in-out;
      border-radius: 4px;
    }

    .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
    .skeleton-title { height: 2.4rem; width: 80%; margin-bottom: 1rem; }
    .skeleton-title-2 { height: 2.4rem; width: 55%; margin-bottom: 1rem; }
    .skeleton-desc { height: 1rem; width: 90%; margin-bottom: 0.5rem; }
    .skeleton-desc-2 { height: 1rem; width: 60%; margin-bottom: 1.5rem; }
    .skeleton-meta { height: 0.7rem; width: 30%; margin-bottom: 1.25rem; }
    .skeleton-source { height: 0.7rem; width: 25%; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--rule); }
    .skeleton-image { height: 320px; width: 92%; margin: 0 auto 2.5rem; border-radius: 10px; }
    .skeleton-body-line { height: 1rem; width: 100%; margin-bottom: 1.2rem; }
    .skeleton-body-short { height: 1rem; width: 70%; margin-bottom: 1.2rem; }

    article.loaded .article-meta      { animation: fadeUp 0.6s ease both; }
    article.loaded .article-headline   { animation: fadeUp 0.6s ease 0.05s both; }
    article.loaded .article-description { animation: fadeUp 0.6s ease 0.1s both; }
    article.loaded .article-image      { animation: fadeUp 0.6s ease 0.15s both; }
    article.loaded .article-body       { animation: fadeUp 0.6s ease 0.2s both; }

    .related {
      margin-top: 2rem;
      padding: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 6px;
    }

    .related-title {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1rem;
    }

    .related-list { list-style: none; }

    .related-item {
      border-bottom: 1px solid var(--rule);
      padding: 0.65rem 0;
    }

    .related-item:last-child { border-bottom: none; }

    .related-link {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.15s;
      display: block;
    }

    .related-link:hover { color: var(--accent); }

    .related-link.no-link { color: var(--ink-light); cursor: default; }
    .related-link.no-link:hover { color: var(--ink-light); }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 0.4rem; text-align: center; }
      article { padding: 0 1.25rem; }
      .article-end { padding: 0 1.25rem 3rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="portal.html">Carta de Notícia<span>.</span></a>
    <p class="header-meta">Carta de Notícia · Breaking news</p>
  </header>

  <article>

    <!-- Skeleton (visível enquanto carrega) -->
    <div id="articleSkeleton" style="padding-top:3rem;">
      <div class="skeleton skeleton-meta"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-title-2"></div>
      <div class="skeleton skeleton-desc"></div>
      <div class="skeleton skeleton-desc-2"></div>
      <div class="skeleton skeleton-source"></div>
      <div class="skeleton skeleton-image"></div>
      <div class="skeleton skeleton-body-line"></div>
      <div class="skeleton skeleton-body-line"></div>
      <div class="skeleton skeleton-body-short"></div>
      <div class="skeleton skeleton-body-line"></div>
      <div class="skeleton skeleton-body-line"></div>
      <div class="skeleton skeleton-body-short"></div>
    </div>

    <!-- Conteúdo real (oculto até carregar) -->
    <div id="articleContent" style="display:none;">
      <div class="article-meta">
        <span class="article-category" id="articleCategory"></span>
        <span class="article-meta-dot"></span>
        <span class="article-date" id="articleDate"></span>
      </div>

      <h1 class="article-headline" id="articleHeadline"></h1>

      <p class="article-description" id="articleDescription"></p>

      <div class="article-source">
        <span>Fonte:</span>
        <a href="#" target="_blank" rel="noopener" id="articleSourceLink"></a>
        <span>&middot;</span>
        <span id="articleAuthor"></span>
      </div>

      <figure class="article-image" style="display:none;">
        <img src="" alt="" id="articleImage" />
        <figcaption id="articleImageCaption"></figcaption>
      </figure>

      <div class="article-body" id="articleBody"></div>

      <div id="relatedSection"></div>
    </div>

  </article>

  <div class="article-end" id="articleEnd" style="display:none;">
    <span>&#9830;</span>
  </div>

  <footer>
    <p>&copy; 2026 Carta de Notícia &middot; Todos os direitos reservados</p>
    <p>Privacidade &middot; Descadastrar</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://zlcntgizmaapqkteaxkd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsY250Z2l6bWFhcHFrdGVheGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDY3ODcsImV4cCI6MjA4Nzg4Mjc4N30.p-DHtTw-AeGYDswsBR73V8jQXlpW_g_6out1xtT6Cr4';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const categoryLabels = {
      politica: 'Política',
      mercados: 'Mercados',
      internacional: 'Internacional',
      tecnologia: 'Tecnologia',
      geral: 'Geral'
    };

    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const articleId = params.get('id');
      if (!articleId) return;

      const { data: article, error } = await sb
        .from('articles')
        .select('*')
        .eq('id', articleId)
        .eq('status', 'published')
        .maybeSingle();

      if (error || !article) {
        document.getElementById('articleSkeleton').style.display = 'none';
        document.getElementById('articleContent').style.display = '';
        document.getElementById('articleHeadline').textContent = 'Artigo não encontrado.';
        return;
      }

      document.title = article.title + ' — Carta de Notícia';
      document.getElementById('articleCategory').textContent = categoryLabels[article.category] || article.category;
      document.getElementById('articleHeadline').textContent = article.title;
      document.getElementById('articleDescription').textContent = article.description || '';
      document.getElementById('articleAuthor').textContent = article.author || '';

      const d = new Date(article.published_at);
      const opts = { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
      document.getElementById('articleDate').textContent = d.toLocaleDateString('pt-BR', opts);

      const sourceLink = document.getElementById('articleSourceLink');
      sourceLink.textContent = article.source_name;
      if (article.source_url) sourceLink.href = article.source_url;

      const img = document.getElementById('articleImage');
      if (article.image_url) {
        img.src = article.image_url;
        img.alt = article.title;
        img.parentElement.style.display = '';
      }
      document.getElementById('articleImageCaption').textContent = article.image_caption || '';

      const bodyEl = document.getElementById('articleBody');
      const relatedEl = document.getElementById('relatedSection');

      if (article.body) {
        // Detectar se o body já é HTML rico (sanitizado no backend)
        // vs texto plano legado (artigos antigos com \n e <strong>)
        var isRichHtml = /<(p|blockquote|h2|figure)[\s>]/i.test(article.body);

        if (isRichHtml) {
          // Detectar bloco de notícias relacionadas inserido pelo CMS
          var relatedBlockRegex = /<h3>Not[ií]cias?\s+relacionadas?<\/h3>\s*<(?:ul|ol)>([\s\S]*?)<\/(?:ul|ol)>/i;
          var relatedBlockMatch = article.body.match(relatedBlockRegex);

          if (relatedBlockMatch) {
            // Remover o bloco do body
            var cleanBody = article.body.replace(relatedBlockRegex, '');
            bodyEl.innerHTML = cleanBody;

            // Extrair links do <ul>
            var linkRegex = /<li[^>]*><a[^>]*href="noticia\.html\?id=([^"]+)"[^>]*>([^<]+)<\/a><\/li>/gi;
            var links = [];
            var m;
            while ((m = linkRegex.exec(relatedBlockMatch[1])) !== null) {
              links.push({ id: m[1], title: m[2] });
            }

            if (links.length > 0) {
              var relHtml = '<div class="related"><p class="related-title">Notícias relacionadas</p><ul class="related-list">';
              links.forEach(function(r) {
                relHtml += '<li class="related-item"><a class="related-link" href="noticia.html?id=' + r.id + '">' + r.title + '</a></li>';
              });
              relHtml += '</ul></div>';
              relatedEl.innerHTML = relHtml;
            }
          } else {
            bodyEl.innerHTML = article.body;
          }
        } else {
          // Legado: texto plano com heurística de formatação
          const relatedRegex = /Notícias?\s+relacionadas?\s*:\s*/i;
          const hasRelated = relatedRegex.test(article.body);

          let mainText = article.body;
          let relatedFragments = [];

          if (hasRelated) {
            const idx = article.body.search(relatedRegex);
            mainText = article.body.slice(0, idx).trim();
            const afterText = article.body.slice(idx).replace(relatedRegex, '').trim();
            relatedFragments = afterText
              .split(/\.\s+/)
              .map(t => t.replace(/\.\s*$/, '').trim())
              .filter(t => t.length > 5);
          }

          bodyEl.innerHTML = formatBody(mainText);

          if (relatedFragments.length > 0) {
            await resolveRelated(relatedFragments, bodyEl, relatedEl);
          }
        }
      }

      // Transição: skeleton → conteúdo
      document.getElementById('articleSkeleton').style.display = 'none';
      document.getElementById('articleContent').style.display = '';
      document.getElementById('articleEnd').style.display = '';
      document.querySelector('article').classList.add('loaded');
    }

    // Remove todas as tags HTML — usado para inspecionar só o texto da linha
    function stripTags(str) {
      return str.replace(/<[^>]*>/g, '');
    }

    function formatBody(text) {
      // Compatibilidade: converte marcadores antigos §BOLD§ para <strong>
      text = text.replace(/§BOLD§([\s\S]*?)§\/BOLD§/g, '<strong>$1</strong>').replace(/§\/?BOLD§/g, '');

      var lines = text.split('\n').filter(function(l) { return l.trim().length > 0; });
      var html = '';
      var i = 0;

      while (i < lines.length) {
        var line = lines[i].trim();

        // Crédito editorial
        if (/^\*/.test(stripTags(line))) {
          html += '<p class="article-credit">' + line + '</p>';
          i++;
          continue;
        }

        // Subtítulo
        if (isSubtitle(line, lines, i)) {
          html += '<h2>' + stripTags(line).trim() + '</h2>';
          i++;
          continue;
        }

        // Blockquote: travessão OU linha que começa com aspas.
        // stripTags() é essencial: RSS às vezes salva <strong>"citação"</strong>
        // e sem strip a checagem via "<" em vez de '"', falhando.
        if (isQuoteStart(line)) {
          var quoteLines = [line];
          while (i + 1 < lines.length && isQuoteContinuation(lines[i + 1].trim())) {
            i++;
            quoteLines.push(lines[i].trim());
          }
          html += '<blockquote>' + quoteLines.join(' ') + '</blockquote>';
          i++;
          continue;
        }

        // Parágrafo normal
        html += '<p>' + formatInlineQuotes(line) + '</p>';
        i++;
      }

      return html;
    }

    function isSubtitle(line, allLines, index) {
      if (index === 0) return false;
      var plain = stripTags(line).trim();
      var clean = plain.replace(/[^\w\sÀ-ú]/g, '').trim();
      var words = clean.split(/\s+/);
      if (words.length > 5) return false;
      if (/[.;,!?]$/.test(plain)) return false;
      if (/^[""\u201C\u201D\u2018\u2019\u2014\u2013–—]/.test(plain)) return false;
      if (plain.length > 50) return false;
      if (!/^[A-ZÀ-Ú]/.test(clean)) return false;
      if (index >= allLines.length - 1) return false;
      return true;
    }

    function isQuoteStart(line) {
      // stripTags resolve: <strong>"Na manhã..."</strong> → '"Na manhã..."' → blockquote ✓
      // Citação inline não afeta: 'A empresa diz que "constatou..."' → começa com 'A' → parágrafo ✓
      var plain = stripTags(line).trim();
      if (/^[\u2014\u2013–—]\s/.test(plain)) return true;  // travessão
      if (/^["\u201C\u2018]/.test(plain)) return true;       // aspas de abertura
      return false;
    }

    function isQuoteContinuation(nextLine) {
      if (!nextLine || nextLine.length === 0) return false;
      var plain = stripTags(nextLine).trim();
      return /^[a-zà-ú]/.test(plain) && !isSubtitleCandidate(nextLine);
    }

    function isSubtitleCandidate(line) {
      var plain = stripTags(line).trim();
      var words = plain.replace(/[^\w\sÀ-ú]/g, '').trim().split(/\s+/);
      return words.length <= 5 && plain.length <= 50 && !/[.;,!?]$/.test(plain) && /^[A-ZÀ-Ú]/.test(plain);
    }

    function formatInlineQuotes(text) {
      return text.replace(/[""\u201C](.*?)[""\u201D]/g, '\u201C$1\u201D');
    }

    async function resolveRelated(fragments, bodyEl, container) {
      const related = [];
      const extraBody = [];

      for (const frag of fragments) {
        const words = frag.split(' ').slice(0, 6).join('%');
        const { data } = await sb
          .from('articles')
          .select('id, title')
          .ilike('title', '%' + words + '%')
          .limit(1);

        if (data && data.length > 0) {
          related.push({ title: frag, id: data[0].id });
        } else {
          extraBody.push(frag);
        }
      }

      if (extraBody.length > 0) {
        const extraHtml = extraBody.map(t => '<p>' + t + '.</p>').join('');
        bodyEl.insertAdjacentHTML('beforeend', extraHtml);
      }

      if (related.length > 0) {
        let html = '<div class="related">' +
          '<p class="related-title">Notícias relacionadas</p>' +
          '<ul class="related-list">';
        related.forEach(r => {
          html += '<li class="related-item">' +
            '<a class="related-link" href="noticia.html?id=' + r.id + '">' + r.title + '</a>' +
          '</li>';
        });
        html += '</ul></div>';
        container.innerHTML = html;
      }
    }

    loadArticle();
  </script>

</body>
</html>
